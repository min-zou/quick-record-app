<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quick Record Icon Generator</title>
<style>
  body { font-family: system-ui, sans-serif; padding: 20px; background: #f5f5f5; }
  .canvas-container { margin: 20px 0; background: white; padding: 20px; border-radius: 8px; }
  canvas { border: 1px solid #ddd; margin: 10px; }
  .download-btn {
    display: inline-block;
    margin: 10px;
    padding: 10px 20px;
    background: #2d6cdf;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 14px;
  }
  .download-btn:hover { background: #1a5bc4; }
  .size-label { font-weight: bold; margin: 10px; color: #333; }
</style>
</head>
<body>
<h1>Quick Record 图标生成器</h1>
<p>在浏览器中打开此文件，右键点击下方的画布选择"图片另存为"，保存为对应尺寸的 PNG 文件。</p>

<div class="canvas-container">
  <div class="size-label">192 x 192 (桌面图标)</div>
  <canvas id="canvas192" width="192" height="192"></canvas>
  <br>
  <a class="download-btn" href="#" onclick="downloadIcon(192)">下载 192x192</a>
</div>

<div class="canvas-container">
  <div class="size-label">512 x 512 (启动图标 / Play Store)</div>
  <canvas id="canvas512" width="512" height="512"></canvas>
  <br>
  <a class="download-btn" href="#" onclick="downloadIcon(512)">下载 512x512</a>
</div>

<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#f7f4ec';
  ctx.fillRect(0, 0, size, size);

  // Rounded rect background
  const padding = size * 0.08;
  const cornerRadius = size * 0.18;
  ctx.fillStyle = '#2d6cdf';
  roundRect(ctx, padding, padding, size - padding * 2, size - padding * 2, cornerRadius);
  ctx.fill();

  // Pen/Record icon
  const centerX = size / 2;
  const centerY = size / 2;
  const scale = size / 512;

  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 24 * scale;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Pen body
  ctx.beginPath();
  ctx.moveTo(centerX - 60 * scale, centerY + 80 * scale);
  ctx.lineTo(centerX + 20 * scale, centerY - 40 * scale);
  ctx.stroke();

  // Pen tip
  ctx.beginPath();
  ctx.moveTo(centerX - 60 * scale, centerY + 80 * scale);
  ctx.lineTo(centerX - 80 * scale, centerY + 120 * scale);
  ctx.stroke();

  // Pen cap/top
  ctx.beginPath();
  ctx.moveTo(centerX + 20 * scale, centerY - 40 * scale);
  ctx.lineTo(centerX + 50 * scale, centerY - 100 * scale);
  ctx.stroke();

  // Lines representing text/record
  ctx.lineWidth = 12 * scale;
  ctx.beginPath();
  ctx.moveTo(centerX - 100 * scale, centerY + 40 * scale);
  ctx.lineTo(centerX - 20 * scale, centerY + 40 * scale);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(centerX - 100 * scale, centerY + 80 * scale);
  ctx.lineTo(centerX + 40 * scale, centerY + 80 * scale);
  ctx.stroke();
}

function roundRect(ctx, x, y, width, height, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}

function downloadIcon(size) {
  const canvas = document.getElementById('canvas' + size);
  const link = document.createElement('a');
  link.download = 'icon-' + size + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// Draw on load
drawIcon(document.getElementById('canvas192'), 192);
drawIcon(document.getElementById('canvas512'), 512);
</script>
</body>
</html>
